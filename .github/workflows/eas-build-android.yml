name: EAS Build Android (Preview APK)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build with EAS (Android APK)
        working-directory: frontend
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive

      - name: Extract APK download link
        if: success()
        run: |
          echo "✅ EAS Build completed successfully!"
          echo "The APK has been built and uploaded to Expo."
          echo "Check your EAS dashboard at: https://expo.dev/builds"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ EAS Build failed. Check the logs above for details."
